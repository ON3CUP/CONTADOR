<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Racha - DBD</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 12px; width: 400px; text-align: center; }
        h2 { color:#ef4444; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 6px; background: #222; color: white; border: 1px solid #444; box-sizing: border-box; }
        .streak-display { font-size: 80px; font-weight: bold; margin: 10px 0; color: #fff; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border-radius: 6px; border: none; background: #333; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button.primary { background: #ef4444; grid-column: span 2; }
        button.action-btn { background: #444; padding: 8px; font-size: 11px; width: 100%; margin-top: 5px; }
        button:active { transform: scale(0.98); }
        select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; background: #222; color: white; border: 1px solid #444; }
    </style>
</head>
<body>
<div class="card">
    <h2>STREAK CONTROL</h2>
    
    <div class="form-group">
        <label>Título del Overlay</label>
        <input type="text" id="tituloInput" placeholder="Ej: WIN STREAK">
        <button onclick="actualizarTitulo()" class="action-btn">Actualizar Título</button>
    </div>

    <div class="streak-display" id="streakLabel">0</div>
    
    <div class="btn-group">
        <button onclick="cambiarRacha(1)" class="primary">Sumar Victoria (+1)</button>
        <button onclick="cambiarRacha(-1)">Restar (-1)</button>
        <button onclick="resetearRacha()">Resetear Racha</button>
    </div>

    <div class="form-group" style="margin-top: 20px; margin-bottom: 0;">
        <label>Asesino</label>
        <select id="selectAsesino" onchange="actualizarKiller()"></select>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBS7uwcZNsSOMtfwIJzewDeACX22fWeaBY",
        authDomain: "dbd-overlay.firebaseapp.com",
        projectId: "dbd-overlay",
        storageBucket: "dbd-overlay.firebasestorage.app",
        databaseURL: "https://dbd-overlay-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const rachaRef = db.ref('winstreak_data');

    const nombres = { 
        enfermera:"Enfermera", deterioro:"Deterioro", pueblerino:"Pueblerino", singularidad:"Singularidad", espiritu:"Espíritu", darklord:"Dark Lord", ghoul:"Ghoul", krasue:"Krasue", animatronico:"Animatrónico", artista:"Artista", cenobita:"Cenobita", payaso:"Payaso", arponero:"Arponero", demogorgon:"Demogorgon", draga:"Draga", pesadilla:"Pesadilla", goodguy:"Good Guy", adiestradora:"Adiestradora", cazadora:"Cazadora", caballero:"Caballero", cerebro:"Cerebro", oni:"Oni", plaga:"Plaga", verdugo:"Verdugo", traicionero:"Traicionero", mellizos:"Mellizos", desconocido:"Desconocido", liche:"Liche", xenomorfo:"Xenomorfo", primero:"Primero", doctor:"Doctor", ghostface:"Ghostface", legion:"Legión", myers:"Myers", nemesis:"Némesis", onryo:"Onryo", cerda:"Cerda", comerciante:"Comerciante", espectro:"Espectro", trampero:"Trampero", bruja:"Bruja", canibal:"Caníbal" 
    };

    let rachaActual = 0;

    const selectK = document.getElementById('selectAsesino');
    Object.entries(nombres).sort((a,b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
        let opt = document.createElement('option');
        opt.value = id; opt.innerText = name.toUpperCase();
        selectK.appendChild(opt);
    });

    rachaRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            rachaActual = data.streak || 0;
            document.getElementById('streakLabel').innerText = rachaActual;
            selectK.value = data.killerId || "trampero";
            if(data.titulo) document.getElementById('tituloInput').value = data.titulo;
        }
    });

    function cambiarRacha(valor) {
        rachaRef.update({ streak: rachaActual + valor });
    }

    function resetearRacha() {
        if(confirm("¿Seguro que quieres resetear la racha?")) {
            rachaRef.update({ streak: 0 });
        }
    }

    function actualizarKiller() {
        const id = selectK.value;
        rachaRef.update({ 
            killerId: id,
            nombreKiller: nombres[id].toUpperCase()
        });
    }

    function actualizarTitulo() {
        const t = document.getElementById('tituloInput').value.toUpperCase();
        rachaRef.update({ titulo: t });
    }
</script>
</body>
</html>
